<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'fr' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ page.description | default: site.description | escape }}">
  <title>{% if page.title == site.title %}{{ site.title }}{% else %}{{ page.title }} — {{ site.title }}{% endif %}</title>
  <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
</head>
<body class="site-page">
  <a class="skip-link" href="#contenu">Aller au contenu</a>
  <div class="site-layout">
    {% include navigation.html %}
    <main id="contenu" class="site-content">
      {{ content }}
    </main>
  </div>
</body>
</html>
